<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thomas Gibbs Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Aeonik';
    src: url('https://raw.githubusercontent.com/borisalek/chat-widget/main/Aeonik-Regular.woff2') format('woff2');
    font-weight: 400;
  }
</style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #c94f0c;
    --orange-light: #e06030;
    --orange-glow: rgba(201,79,12,0.35);
    --orange-border: rgba(201,79,12,0.6);
    --bg: #0a0a0a;
    --bg-bubble-left: #3d1a08;
    --bg-bubble-right: #161616;
    --text: #e8e0d8;
    --text-dim: #8a7a70;
    --popup-w: 860px;
    --popup-h: 620px;
  }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0a0a0a;
    font-family: 'Aeonik', 'DM Sans', sans-serif;
  }

  /* ── POPUP WRAPPER ── */
  .chat-popup {
    position: relative;
    width: 100%;
    height: 100vh;
    background: var(--bg);
    border-top: 2px solid rgba(255,255,255,0.10);
    border-left: 2px solid rgba(255,255,255,0.10);
    border-right: 2px solid rgba(255,255,255,0.10);
    border-bottom: none;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 9999;
    box-shadow: 0 0 60px rgba(201,79,12,0.15), 0 0 0 1px rgba(201,79,12,0.08);
    opacity: 1;
    pointer-events: all;
  }



  /* ── CLOSE BUTTON ── */
  .close-btn {
    position: absolute;
    top: 16px;
    right: 20px;
    width: 36px;
    height: 36px;
    background: transparent;
    border-top: 2px solid rgba(255,255,255,0.10);
    border-left: 2px solid rgba(255,255,255,0.10);
    border-right: 2px solid rgba(255,255,255,0.10);
    border-bottom: none;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: background 0.2s, color 0.2s;
    font-family: 'Aeonik', 'DM Sans', sans-serif;
    letter-spacing: 0;
  }
  .close-btn:hover {
    background: var(--orange);
    border-color: var(--orange);
  }
  .close-btn svg {
    width: 14px;
    height: 14px;
  }

  /* ── SCROLL AREA ── */
  .scroll-area {
    flex: 1;
    overflow-y: scroll;
    overflow-x: hidden;
    padding: 24px 24px 16px 24px;
    scrollbar-width: thin;
    scrollbar-color: #FF4C00 transparent;
    position: relative;
  }
  .scroll-area::-webkit-scrollbar { width: 4px; display: block; }
  .scroll-area::-webkit-scrollbar-thumb { background: #FF4C00; border-radius: 2px; min-height: 40px; }
  .scroll-area::-webkit-scrollbar-track { background: rgba(255,76,0,0.1); }
  .scroll-area::-webkit-scrollbar-button { display: none; height: 0; width: 0; }

  /* ── TIMELINE ── */
  .timeline { position: relative; }

  .curves-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
    z-index: 0;
  }



  /* ── MESSAGE ROW ── */
  .msg-row {
    display: flex;
    align-items: flex-start;
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
    gap: 0;
  }

  /* Left = user: bubble left, user-icon right */
  .msg-row.left {
    justify-content: flex-start;
    padding-right: 0;
  }

  /* Right = agent: agent-icon left, bubble right */
  .msg-row.right {
    justify-content: flex-end;
    padding-left: 0;
  }

  /* ── BUBBLE ── */
  .bubble {
    width: 80%;
    padding: 18px 22px;
    position: relative;
  }
  .msg-row.left .bubble {
    background: #242424;
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset -2px -90px 98px 0px rgba(255,76,0,0.54);
  }
  .msg-row.right .bubble {
    background: var(--bg-bubble-right);
  }

  .bubble p {
    font-size: 18px;
    line-height: 1.75;
    color: var(--text);
    font-weight: 300;
  }

  /* ── AVATAR (agent - left of bubble, top aligned) ── */
  .avatar {
    width: 48px;
    height: 48px;
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
    background: transparent;
    align-self: flex-start;
    order: 0;
  }
  .msg-row.right .avatar { order: 0; }
  .msg-row.right .bubble { order: 1; }

  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* ── USER ICON (right of user bubble, top aligned, in flex flow) ── */
  .user-av {
    width: 48px;
    height: 48px;
    border-radius: 2px;
    overflow: hidden;
    background: transparent;
    flex-shrink: 0;
    align-self: flex-start;
    order: 2;
  }
  .msg-row.left .bubble { order: 1; }
  .user-av img { width: 100%; height: 100%; object-fit: cover; }

  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-initials {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, var(--orange) 0%, #7a2e04 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: #fff;
    letter-spacing: 0.05em;
  }

  /* ── TYPING DOTS ── */
  .typing-dots { display: flex; gap: 5px; padding: 4px 0; align-items: center; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--orange);
    animation: blink 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink {
    0%,80%,100%{ opacity:.2; transform:scale(.8); }
    40%{ opacity:1; transform:scale(1); }
  }

  /* ── INPUT SECTION ── */
  .input-section {
    flex-shrink: 0;
    position: relative;
    background: transparent;
    padding: 12px;
    border: 2px solid rgba(255,105,0,0.64);
    border-bottom: none;
  }
  .input-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, #3B1C07 0%, #FF6900 100%);
    opacity: 0.32;
    pointer-events: none;
    z-index: 0;
  }

  .input-outer { display: none; }

  .input-bar {
    /* Inner frame: 96px, black fill */
    background: #000000;
    display: flex;
    align-items: center;
    padding: 0 0 0 24px;
    cursor: text;
    height: 96px;
    position: relative;
    z-index: 1;
  }

  .placeholder-text {
    font-family: 'Aeonik', 'DM Sans', sans-serif;
    font-size: 18px;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.4);
    flex: 1;
    pointer-events: none;
    user-select: none;
    position: relative;
    z-index: 1;
  }

  .input-bar textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: 'Aeonik', 'DM Sans', sans-serif;
    font-size: 18px;
    color: var(--text);
    position: relative;
    z-index: 1;
    line-height: 1.5;
    display: none;
    padding: 4px 0;
    overflow-y: auto;
    height: auto;
    max-height: 72px;
    scrollbar-width: thin;
    scrollbar-color: #FF6900 transparent;
  }
  .input-bar textarea::-webkit-scrollbar { width: 3px; }
  .input-bar textarea::-webkit-scrollbar-thumb { background: #FF6900; border-radius: 2px; }
  .input-bar textarea::-webkit-scrollbar-track { background: transparent; }
  .input-bar.active textarea { display: block; }
  .input-bar.active .placeholder-text { display: none; }
  .input-bar textarea::placeholder { color: rgba(255,255,255,0.4); font-family: 'Aeonik', 'DM Sans', sans-serif; font-size: 18px; }

  /* ── SEND BUTTON ── */
  .send-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 15px;
  }
  .send-btn img {
    width: auto;
    height: auto;
    max-width: 64px;
    max-height: 64px;
    display: block;
    object-fit: contain;
  }





  /* ── RESPONSIVE ── */

</style>
</head>
<body>

<!-- CHAT POPUP -->
<div class="chat-popup" id="chatPopup">

  <!-- Scroll area -->
  <div class="scroll-area" id="scrollArea">
    <div class="timeline" id="timeline">
      <svg class="curves-svg" id="curvesSvg"></svg>
    </div>
  </div>

  <!-- Input -->
  <div class="input-section">
    <div class="input-outer"></div>
    <div class="input-bar" id="inputBar">
      <span class="placeholder-text">YOUR QUESTION...</span>
      <textarea id="textarea" rows="1" placeholder="YOUR QUESTION..."></textarea>
      <button class="send-btn" id="sendBtn">
        <img src="https://raw.githubusercontent.com/Geogre-Blaze/chat-widget/d37df5b7593abf30e8df1fa9251f96cf774e7790/send-icon.svg" alt="send">
      </button>
    </div>
  </div>

</div>

<script>
const WEBHOOK_URL = 'https://e8markets-tom-gibbs.app.n8n.cloud/webhook/f406671e-c954-4691-b39a-66c90aa2f103/chat';
const ROUTE       = 'general';
const AGENT_AVATAR = 'https://raw.githubusercontent.com/Geogre-Blaze/chat-widget/refs/heads/main/gibbs-icon-inchat.png';
const USER_ICON = 'https://raw.githubusercontent.com/Geogre-Blaze/chat-widget/refs/heads/main/user-icon.png';

const INITIAL = [];

// Elements
const popup      = document.getElementById('chatPopup');
const closeBtn   = document.getElementById('closeBtn');
const timeline   = document.getElementById('timeline');
const svg        = document.getElementById('curvesSvg');
const scrollArea = document.getElementById('scrollArea');
const inputBar   = document.getElementById('inputBar');
const textarea   = document.getElementById('textarea');
const sendBtn    = document.getElementById('sendBtn');
const sessionId  = crypto.randomUUID();

// Initialize immediately
INITIAL.forEach(m => addMsg(m.text, m.side));
setTimeout(() => { scrollArea.scrollTop = scrollArea.scrollHeight; }, 100);

function openPopup() {}
function closePopup() {}

// ── Add message ──
function addMsg(text, side, typing = false) {
  const row = document.createElement('div');
  row.className = `msg-row ${side}`;
  row.dataset.side = side;

  if (side === 'right') {
    const av = document.createElement('div');
    av.className = 'avatar';
    av.innerHTML = `<img src="${AGENT_AVATAR}" alt="Thomas Gibbs">`;
    row.appendChild(av);
  }
  if (side === 'left') {
    const av = document.createElement('div');
    av.className = 'avatar user-av';
    av.innerHTML = `<img src="${USER_ICON}" alt="User">`;
    row.appendChild(av);
  }


  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = typing
    ? `<div class="typing-dots"><span></span><span></span><span></span></div>`
    : `<p>${text}</p>`;



  row.appendChild(bubble);
  timeline.appendChild(row);

  setTimeout(() => { scrollArea.scrollTop = scrollArea.scrollHeight; }, 60);
  requestAnimationFrame(() => requestAnimationFrame(drawCurves));
  return { row, bubble };
}

function drawCurves() {}

// ── Input logic ──
inputBar.addEventListener('click', () => {
  inputBar.classList.add('active');
  textarea.focus();
});

textarea.addEventListener('blur', () => {
  if (!textarea.value.trim()) inputBar.classList.remove('active');
});

textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';

});

textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
});
sendBtn.addEventListener('click', submit);

// ── Submit ──
async function submit() {
  const msg = textarea.value.trim();
  if (!msg) return;

  textarea.value = '';
  textarea.style.height = 'auto';

  textarea.disabled = true;
  inputBar.classList.remove('active');

  addMsg(msg, 'left');
  const { bubble: typingBubble } = addMsg('', 'right', true);

  try {
    const res  = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({ chatInput: msg, sessionId, route: ROUTE })
    });
    const data = await res.json();
    typingBubble.innerHTML = `<p>${data.output || "Sorry, I couldn't process that."}</p>`;
  } catch {
    typingBubble.innerHTML = `<p style="color:var(--text-dim)">Connection error. Please try again.</p>`;
  }

  // No asterisk on right (agent) bubbles - avatar is used instead

  requestAnimationFrame(() => requestAnimationFrame(drawCurves));
  setTimeout(() => { scrollArea.scrollTop = scrollArea.scrollHeight; }, 60);

  textarea.disabled = false;

  textarea.focus();
  inputBar.classList.add('active');
}

// ── Redraw on resize/scroll ──
window.addEventListener('resize', drawCurves);
scrollArea.addEventListener('scroll', drawCurves);

// ── Expose open/close globally for Framer ──
window.openThomasChat  = openPopup;
window.closeThomasChat = closePopup;
</script>
</body>
</html>
