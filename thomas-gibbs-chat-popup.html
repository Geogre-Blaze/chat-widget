<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thomas Gibbs Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Aeonik';
    src: url('https://raw.githubusercontent.com/borisalek/chat-widget/main/Aeonik-Regular.woff2') format('woff2');
    font-weight: 400;
  }
</style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #c94f0c;
    --orange-light: #e06030;
    --orange-glow: rgba(201,79,12,0.35);
    --orange-border: rgba(201,79,12,0.6);
    --bg: #0a0a0a;
    --bg-bubble-left: #3d1a08;
    --bg-bubble-right: #161616;
    --text: #e8e0d8;
    --text-dim: #8a7a70;
    --popup-w: 860px;
    --popup-h: 620px;
  }

  body {
    background: #1a1a1a;
    font-family: 'Aeonik', 'DM Sans', sans-serif;
  }

  /* ── POPUP WRAPPER ── */
  .chat-popup {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100%;
    height: 100%;
    background: var(--bg);
    border: 1px solid var(--orange-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 9999;
    box-shadow: 0 0 60px rgba(201,79,12,0.15), 0 0 0 1px rgba(201,79,12,0.08);
    opacity: 1;
    pointer-events: all;
  }

  /* Orange accent bars - right edge (from screenshot) */
  .chat-popup::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 4px;
    height: 100%;
    background: var(--orange);
    z-index: 10;
  }

  /* ── CLOSE BUTTON ── */
  .close-btn {
    position: absolute;
    top: 16px;
    right: 20px;
    width: 36px;
    height: 36px;
    background: transparent;
    border: 1px solid var(--orange-border);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: background 0.2s, color 0.2s;
    font-family: 'Aeonik', 'DM Sans', sans-serif;
    letter-spacing: 0;
  }
  .close-btn:hover {
    background: var(--orange);
    border-color: var(--orange);
  }
  .close-btn svg {
    width: 14px;
    height: 14px;
  }

  /* ── SCROLL AREA ── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 40px 40px 20px 40px;
    scrollbar-width: none;
    position: relative;
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* ── TIMELINE ── */
  .timeline { position: relative; }

  .curves-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
    z-index: 0;
  }



  /* ── MESSAGE ROW ── */
  .msg-row {
    display: flex;
    align-items: flex-start;
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
  }
  .msg-row.left  { justify-content: flex-start; padding-right: 60px; }
  .msg-row.right { justify-content: flex-end;  padding-left: 60px; }

  /* ── BUBBLE ── */
  .bubble {
    width: 80%;
    padding: 18px 22px;
    position: relative;
  }
  .msg-row.left .bubble {
    background: #242424;
    border-left: none;
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset -2px -90px 98px 0px rgba(255,76,0,0.54);
  }
  .msg-row.left .bubble::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 40px;
    background: #FF4C00;
  }
  .msg-row.right .bubble {
    background: var(--bg-bubble-right);
    border-right: 3px solid var(--orange);
  }

  /* Vertical accent bar on sides (from screenshot) */
  .msg-row.left .bubble::after {
    content: '';
    position: absolute;
    right: -3px; top: 20%; bottom: 20%;
    width: 2px;
    background: var(--orange);
    opacity: 0.5;
  }
  .msg-row.right .bubble::after {
    content: '';
    position: absolute;
    left: -3px; top: 20%; bottom: 20%;
    width: 2px;
    background: var(--orange);
    opacity: 0.5;
  }

  .bubble p {
    font-size: 13px;
    line-height: 1.75;
    color: var(--text);
    font-weight: 300;
  }

  /* ── ASTERISK ── */
  .asterisk {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 48px;
    background: none;
    border: none;
    pointer-events: none;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .asterisk img {
    width: 48px;
    height: 48px;
    object-fit: contain;
  }
  .msg-row.left .asterisk  { right: -58px; }
  .msg-row.right .asterisk { left: -58px; }


  /* ── AVATAR ── */
  .avatar {
    width: 48px;
    height: 48px;
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
    background: #1a1a1a;
    align-self: center;
    order: 0;
    margin-right: 0;
  }
  .msg-row.right {
    position: relative;
    gap: 0;
  }
  .msg-row.right .avatar {
    order: 0;
  }
  .msg-row.right .bubble {
    order: 1;
  }

  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-initials {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, var(--orange) 0%, #7a2e04 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: #fff;
    letter-spacing: 0.05em;
  }

  /* ── TYPING DOTS ── */
  .typing-dots { display: flex; gap: 5px; padding: 4px 0; align-items: center; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--orange);
    animation: blink 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink {
    0%,80%,100%{ opacity:.2; transform:scale(.8); }
    40%{ opacity:1; transform:scale(1); }
  }

  /* ── INPUT SECTION ── */
  /* ── INPUT SECTION ── */
  .input-section {
    flex-shrink: 0;
    padding: 0;
    position: relative;
    /* Outer frame: 120px, vertical linear gradient border */
    background: linear-gradient(180deg, #FF6900 0%, #FF6900 100%);
    padding: 1px;
  }

  /* Outer gradient background behind inner bar */
  .input-outer {
    background: linear-gradient(180deg, #3B1C07 0%, #FF6900 100%);
    opacity: 0.32;
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .input-bar {
    /* Inner frame: 96px, black fill */
    background: #000000;
    display: flex;
    align-items: center;
    padding: 0 0 0 24px;
    cursor: text;
    height: 96px;
    position: relative;
    z-index: 1;
    margin: 12px 0;
  }

  .placeholder-text {
    font-family: 'Aeonik', 'DM Sans', sans-serif;
    font-size: 18px;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.4);
    flex: 1;
    pointer-events: none;
    user-select: none;
    position: relative;
    z-index: 1;
  }

  .input-bar textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: 'Aeonik', 'DM Sans', sans-serif;
    font-size: 18px;
    color: var(--text);
    position: relative;
    z-index: 1;
    line-height: 1.5;
    display: none;
    padding: 4px 0;
    overflow-y: auto;
    max-height: 80px;
    scrollbar-width: thin;
    scrollbar-color: #FF6900 transparent;
  }
  .input-bar textarea::-webkit-scrollbar { width: 3px; }
  .input-bar textarea::-webkit-scrollbar-thumb { background: #FF6900; border-radius: 2px; }
  .input-bar textarea::-webkit-scrollbar-track { background: transparent; }
  .input-bar.active textarea { display: block; }
  .input-bar.active .placeholder-text { display: none; }
  .input-bar textarea::placeholder { color: rgba(255,255,255,0.4); font-family: 'Aeonik', 'DM Sans', sans-serif; font-size: 18px; }

  /* ── SEND BUTTON ── */
  .send-btn {
    width: 65px;
    height: 65px;
    background: #1a1a1a;
    border: none;
    border-left: 2px solid var(--orange);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 0 20px rgba(255,76,0,0.5), inset 0 0 20px rgba(255,76,0,0.08);
    padding: 0;
    overflow: hidden;
  }
  .send-btn img {
    width: 65px;
    height: 65px;
    display: block;
    object-fit: cover;
    mix-blend-mode: normal;
    background: #1a1a1a;
  }





  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .chat-popup {
      width: calc(100vw - 16px);
      right: 8px;
      bottom: 80px;
      height: 70vh;
    }
  }
  @media (max-width: 480px) {
    .scroll-area { padding: 28px 16px 16px; }
    .bubble { width: 88%; padding: 12px 14px; }
    .bubble p { font-size: 12.5px; }
    .msg-row.left  { padding-right: 0; }
    .msg-row.right { padding-left: 40px; }
    .asterisk { display: none; }
  }
</style>
</head>
<body>

<!-- CHAT POPUP -->
<div class="chat-popup" id="chatPopup">

  <!-- Scroll area -->
  <div class="scroll-area" id="scrollArea">
    <div class="timeline" id="timeline">
      <svg class="curves-svg" id="curvesSvg"></svg>
    </div>
  </div>

  <!-- Input -->
  <div class="input-section">
    <div class="input-outer"></div>
    <div class="input-bar" id="inputBar">
      <span class="placeholder-text">YOUR QUESTION...</span>
      <textarea id="textarea" rows="1" placeholder="YOUR QUESTION..."></textarea>
      <button class="send-btn" id="sendBtn">
        <img src="https://raw.githubusercontent.com/borisalek/chat-widget/dac2e6d133235f09105d4130f9fccd1fbc451e6c/send2.svg" alt="send" style="width:65px;height:65px;display:block;">
      </button>
    </div>
  </div>

</div>

<script>
const WEBHOOK_URL = 'https://nonpatented-enchantedly-reyes.ngrok-free.dev/webhook/f406671e-c954-4691-b39a-66c90aa2f103/chat';
const ROUTE       = 'general';
const AGENT_AVATAR = 'https://raw.githubusercontent.com/borisalek/chat-widget/main/Chat-icon.png';

const INITIAL = [
  {
    side: 'right',
    text: 'Proactively conceptualize user-centric bandwidth via seamless infrastructures. Conveniently.'
  },
  {
    side: 'left',
    text: 'Completely transition an expanded array of e-commerce rather than proactive supply chains. Rapidiously deploy premier imperatives for cross-unit bandwidth. Authoritatively integrate multimedia based leadership after economically sound deliverables. Distinctively recaptiualize process-centric leadership before team building data.<br><br>Rapidiously leverage other\'s 2.0 content whereas interactive technology. Conveniently visualize frictionless human capital whereas bricks-and-clicks applications. Proactively engage compelling schemas for.'
  },
  {
    side: 'right',
    text: 'Completely transition an expanded array of e-commerce rather than proactive supply chains. Rapidiously deploy premier imperatives for cross-unit bandwidth. Authoritatively integrate multimedia based leadership after economically sound deliverables. Distinctively recaptiualize process-centric leadership before team building data.<br><br>Rapidiously leverage other\'s 2.0 content whereas interactive technology. Conveniently visualize frictionless human capital whereas bricks-and-clicks applications. Proactively engage compelling schemas for.'
  },
];

// Elements
const popup      = document.getElementById('chatPopup');
const closeBtn   = document.getElementById('closeBtn');
const timeline   = document.getElementById('timeline');
const svg        = document.getElementById('curvesSvg');
const scrollArea = document.getElementById('scrollArea');
const inputBar   = document.getElementById('inputBar');
const textarea   = document.getElementById('textarea');
const sendBtn    = document.getElementById('sendBtn');
const sessionId  = crypto.randomUUID();

// Initialize immediately
INITIAL.forEach(m => addMsg(m.text, m.side));
setTimeout(() => { scrollArea.scrollTop = scrollArea.scrollHeight; }, 100);

function openPopup() {}
function closePopup() {}

// ── Add message ──
function addMsg(text, side, typing = false) {
  const row = document.createElement('div');
  row.className = `msg-row ${side}`;
  row.dataset.side = side;

  // Avatar on both sides
  if (side === 'right') {
    const av = document.createElement('div');
    av.className = 'avatar';
    av.innerHTML = AGENT_AVATAR
      ? `<img src="${AGENT_AVATAR}" alt="Thomas Gibbs">`
      : `<div class="avatar-initials">T</div>`;
    row.appendChild(av);
  }


  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = typing
    ? `<div class="typing-dots"><span></span><span></span><span></span></div>`
    : `<p>${text}</p>`;

  if (side === 'left') {
    const ast = document.createElement('span');
    ast.className = 'asterisk';
    ast.innerHTML = '<img src="https://raw.githubusercontent.com/borisalek/chat-widget/refs/heads/main/user.png" alt="">';
    bubble.appendChild(ast);
  }

  row.appendChild(bubble);
  timeline.appendChild(row);

  setTimeout(() => { scrollArea.scrollTop = scrollArea.scrollHeight; }, 60);
  requestAnimationFrame(() => requestAnimationFrame(drawCurves));
  return { row, bubble };
}

function drawCurves() {}

// ── Input logic ──
inputBar.addEventListener('click', () => {
  inputBar.classList.add('active');
  textarea.focus();
});

textarea.addEventListener('blur', () => {
  if (!textarea.value.trim()) inputBar.classList.remove('active');
});

textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';

});

textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
});
sendBtn.addEventListener('click', submit);

// ── Submit ──
async function submit() {
  const msg = textarea.value.trim();
  if (!msg) return;

  textarea.value = '';
  textarea.style.height = 'auto';

  textarea.disabled = true;
  inputBar.classList.remove('active');

  addMsg(msg, 'left');
  const { bubble: typingBubble } = addMsg('', 'right', true);

  try {
    const res  = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({ chatInput: msg, sessionId, route: ROUTE })
    });
    const data = await res.json();
    typingBubble.innerHTML = `<p>${data.output || "Sorry, I couldn't process that."}</p>`;
  } catch {
    typingBubble.innerHTML = `<p style="color:var(--text-dim)">Connection error. Please try again.</p>`;
  }

  // No asterisk on right (agent) bubbles - avatar is used instead

  requestAnimationFrame(() => requestAnimationFrame(drawCurves));
  setTimeout(() => { scrollArea.scrollTop = scrollArea.scrollHeight; }, 60);

  textarea.disabled = false;

  textarea.focus();
  inputBar.classList.add('active');
}

// ── Redraw on resize/scroll ──
window.addEventListener('resize', drawCurves);
scrollArea.addEventListener('scroll', drawCurves);

// ── Expose open/close globally for Framer ──
window.openThomasChat  = openPopup;
window.closeThomasChat = closePopup;
</script>
</body>
</html>
